<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SkillMAX v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Plus+Jakarta+Sans:wght@400;500;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        background: '#050505',
                        surface: '#0F0F0F',
                        surfaceHighlight: '#1A1A1A',
                        border: '#262626',
                        primary: '#FF2A42', 
                        primaryDim: '#CC152B',
                        textMain: '#EDEDED',
                        textMuted: '#888888',
                    },
                    fontFamily: {
                        heading: ['"Outfit"', 'sans-serif'],
                        body: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    boxShadow: {
                        'glow': '0 0 20px -5px rgba(255, 42, 66, 0.3)',
                        'card': '0 4px 6px -1px rgba(0, 0, 0, 0.5), 0 2px 4px -1px rgba(0, 0, 0, 0.3)',
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #050505;
            color: #EDEDED;
            -webkit-tap-highlight-color: transparent;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .glass-nav {
            background: rgba(15, 15, 15, 0.85);
            backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .tab-active {
            background-color: #FF2A42;
            color: white;
            box-shadow: 0 4px 15px rgba(255, 42, 66, 0.3);
        }
        
        .tab-inactive { color: #888888; }
        .tab-inactive:hover { color: #EDEDED; background-color: rgba(255,255,255,0.05); }

        .card-gradient {
            background: linear-gradient(145deg, #121212 0%, #0a0a0a 100%);
        }
        
        .fade-enter { opacity: 0; transform: translateY(10px); }
        .fade-enter-active { opacity: 1; transform: translateY(0); transition: opacity 300ms, transform 300ms; }
    </style>

    <!-- PWA Injected by PWA Forge -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
    <meta name="theme-color" content="#000000">
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./service-worker.js');
        });
      }
    </script>
</head>
<body class="font-body h-[100dvh] flex flex-col relative overflow-hidden">


    <header class="pt-6 pb-2 px-6 flex justify-between items-center z-10">
        <div>
            <h1 class="font-heading font-extrabold text-2xl tracking-tight flex items-center gap-2">
                Skill<span class="text-primary">MAX</span>
            </h1>
            <div class="flex items-center gap-2 mt-1">
                <div class="h-1.5 w-24 bg-surfaceHighlight rounded-full overflow-hidden">
                    <div id="global-xp-bar" class="h-full bg-primary transition-all duration-500" style="width: 0%"></div>
                </div>
                <p id="global-level" class="text-[10px] text-primary font-bold tracking-wide">LVL 1</p>
                <span id="activeUserDisplay" class="text-[10px] text-textMuted font-bold tracking-wide ml-2 uppercase border-l border-border pl-2"></span>
            </div>
        </div>
        
        <div class="flex items-center gap-3">
            <button onclick="openModal('addSkillModal')" class="hidden md:flex bg-surfaceHighlight border border-border hover:border-primary text-textMain px-4 py-2 rounded-xl text-sm font-bold transition-all items-center gap-2 hover:shadow-glow group">
                <i class="fa-solid fa-plus text-primary group-hover:rotate-90 transition-transform"></i> New Skill
            </button>
            <button onclick="handleLogout()" title="Log Out" class="bg-surfaceHighlight border border-border hover:border-red-500 text-textMuted hover:text-red-500 w-10 h-10 rounded-xl flex items-center justify-center transition-all hover:shadow-[0_0_15px_-3px_rgba(239,68,68,0.3)]">
                <i class="fa-solid fa-right-from-bracket"></i>
            </button>
        </div>
    </header>

    <div class="px-6 py-2 overflow-x-auto no-scrollbar flex gap-2" id="dashboardFilters"></div>

    <div class="px-6 py-4 md:hidden sticky top-0 z-20 bg-[#050505]/95 backdrop-blur-sm">
        <div class="flex p-1 bg-surfaceHighlight rounded-2xl border border-border shadow-lg">
            <button onclick="switchTab('backlog')" id="tab-backlog" class="flex-1 py-2.5 rounded-xl text-xs font-bold font-heading transition-all duration-300">PLAN</button>
            <button onclick="switchTab('active')" id="tab-active" class="flex-1 py-2.5 rounded-xl text-xs font-bold font-heading transition-all duration-300">DOING</button>
            <button onclick="switchTab('mastered')" id="tab-mastered" class="flex-1 py-2.5 rounded-xl text-xs font-bold font-heading transition-all duration-300">DONE</button>
        </div>
    </div>

<main class="flex-1 min-h-0 px-4 md:px-6 pb-24 md:pb-6 overflow-y-auto no-scrollbar scroll-smooth">

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <section id="view-backlog" class="flex flex-col md:block">
                <div class="hidden md:flex justify-between items-center mb-4 px-2">
                    <h2 class="font-heading font-bold text-textMuted text-sm tracking-wider">BACKLOG</h2>
                    <span id="count-backlog" class="text-xs font-mono text-textMuted bg-surfaceHighlight px-2 py-1 rounded-lg">0</span>
                </div>
                <div id="col-backlog" class="space-y-3 pb-4"></div>
            </section>

            <section id="view-active" class="flex flex-col hidden md:block">
                <div class="hidden md:flex justify-between items-center mb-4 px-2">
                    <h2 class="font-heading font-bold text-primary text-sm tracking-wider flex items-center gap-2">
                        <div class="w-2 h-2 rounded-full bg-primary animate-pulse"></div> IN PROGRESS
                    </h2>
                    <span id="count-active" class="text-xs font-mono text-primary bg-primary/10 px-2 py-1 rounded-lg border border-primary/20">0</span>
                </div>
                <div id="col-active" class="space-y-3 pb-4"></div>
            </section>

            <section id="view-mastered" class="flex flex-col hidden md:block">
                <div class="hidden md:flex justify-between items-center mb-4 px-2">
                    <h2 class="font-heading font-bold text-green-500 text-sm tracking-wider">MASTERED</h2>
                    <span id="count-mastered" class="text-xs font-mono text-green-500 bg-green-500/10 px-2 py-1 rounded-lg border border-green-500/20">0</span>
                </div>
                <div id="col-mastered" class="space-y-3 pb-4"></div>
            </section>
        </div>
    </main>


    <button onclick="openModal('addSkillModal')" class="md:hidden fixed bottom-6 right-6 w-14 h-14 bg-primary text-white rounded-full shadow-glow flex items-center justify-center text-xl z-30 transition-transform active:scale-90 border-2 border-primary/50">
        <i class="fa-solid fa-plus"></i>
    </button>

    <div id="addSkillModal" class="fixed inset-0 bg-black/80 hidden z-50 flex items-end md:items-center justify-center backdrop-blur-sm transition-all duration-300">
        <div id="addModalContent" class="bg-surface w-full md:max-w-md md:rounded-3xl rounded-t-3xl border border-border p-6 shadow-2xl transform translate-y-full md:translate-y-0 transition-transform duration-300">
            <div class="w-12 h-1.5 bg-border rounded-full mx-auto mb-6 md:hidden"></div>
            <h3 class="font-heading text-xl font-bold text-white mb-6">New Skill</h3>
            <form id="addSkillForm" onsubmit="handleCreateSkill(event)">
                <div class="space-y-5">
                    <div>
                        <label class="block text-textMuted text-xs font-bold mb-2 uppercase tracking-wider">Skill Name</label>
                        <input type="text" id="skillInput" required placeholder="e.g. Three.js" 
                            class="w-full bg-surfaceHighlight border border-border text-white px-5 py-4 rounded-2xl focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all text-sm font-medium">
                    </div>
                    <div>
                        <label class="block text-textMuted text-xs font-bold mb-2 uppercase tracking-wider">Category</label>
                        <div class="flex gap-2 overflow-x-auto pb-2 no-scrollbar" id="categoryChips"></div>
                        <input type="hidden" id="categoryInput" value="Code">
                    </div>
                </div>
                <div class="flex gap-3 mt-8">
                    <button type="button" onclick="closeModal('addSkillModal')" class="flex-1 py-3.5 rounded-xl bg-transparent border border-border text-textMuted font-bold text-sm">Cancel</button>
                    <button type="submit" id="createSkillBtn" class="flex-[2] py-3.5 rounded-xl bg-primary text-white font-bold text-sm shadow-glow">Create</button>
                </div>
            </form>
        </div>
    </div>

    <div id="detailModal" class="fixed inset-0 bg-black/95 hidden z-50 flex flex-col backdrop-blur-md transition-all duration-300">
        <div class="px-6 py-4 border-b border-border flex justify-between items-center bg-surface/50">
            <button onclick="closeModal('detailModal')" class="w-10 h-10 rounded-full bg-surfaceHighlight flex items-center justify-center text-textMuted hover:bg-white hover:text-black transition-colors">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            <div class="flex gap-2">
                <button onclick="deleteCurrentSkill()" class="w-10 h-10 rounded-full bg-red-900/20 text-red-500 flex items-center justify-center hover:bg-red-500 hover:text-white transition-colors">
                    <i class="fa-regular fa-trash-can"></i>
                </button>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto px-6 pt-6 pb-24">
            <div class="flex justify-between items-start">
                <div>
                    <span id="detailCategory" class="text-[10px] font-bold text-primary bg-primary/10 px-3 py-1 rounded-full uppercase tracking-wide border border-primary/20">Category</span>
                    <h1 id="detailTitle" class="text-3xl md:text-4xl font-heading font-extrabold text-white mt-4 mb-1 leading-tight">Skill Name</h1>
                    <p id="detailDate" class="text-textMuted text-xs font-medium mb-6">Started just now</p>
                </div>
                <div class="text-center bg-surfaceHighlight p-3 rounded-2xl border border-border">
                    <div class="text-2xl font-bold text-white" id="skill-xp-display">0</div>
                    <div class="text-[10px] text-textMuted uppercase font-bold">XP</div>
                </div>
            </div>

            <div class="bg-gradient-to-br from-[#151515] to-[#0a0a0a] border border-border rounded-3xl p-6 mb-8 relative overflow-hidden group">
                <div class="absolute inset-0 bg-primary/5 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                <div class="flex justify-between items-center relative z-10">
                    <div>
                        <div class="text-xs text-textMuted font-bold uppercase tracking-wider mb-1"><i class="fa-solid fa-stopwatch mr-1"></i> Focus Session</div>
                        <div id="timer-display" class="text-4xl font-mono font-bold text-white tracking-widest">00:00:00</div>
                    </div>
                    <button id="timer-btn" onclick="toggleTimer()" class="w-14 h-14 rounded-full bg-primary text-white shadow-glow flex items-center justify-center text-xl hover:scale-105 active:scale-95 transition-all">
                        <i class="fa-solid fa-play ml-1" id="timer-icon"></i>
                    </button>
                </div>
            </div>

            <div class="bg-surfaceHighlight p-1.5 rounded-2xl flex gap-1 mb-8 border border-border">
                <button onclick="updateStatus('backlog')" id="status-backlog" class="flex-1 py-3 rounded-xl text-xs font-bold transition-all flex flex-col items-center gap-1 opacity-50">
                    <i class="fa-regular fa-circle"></i> Plan
                </button>
                <button onclick="updateStatus('active')" id="status-active" class="flex-1 py-3 rounded-xl text-xs font-bold transition-all flex flex-col items-center gap-1 text-primary">
                    <i class="fa-solid fa-bolt"></i> Active
                </button>
                <button onclick="updateStatus('mastered')" id="status-mastered" class="flex-1 py-3 rounded-xl text-xs font-bold transition-all flex flex-col items-center gap-1 text-green-500 opacity-50">
                    <i class="fa-solid fa-trophy"></i> Done
                </button>
            </div>

            <div class="mb-4 flex items-center gap-2 justify-between">
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-timeline text-textMuted"></i>
                    <h3 class="font-heading font-bold text-lg">Journal</h3>
                </div>
            </div>
            
            <div id="logsContainer" class="space-y-6 pl-4 border-l-2 border-border ml-2 relative"></div>
        </div>

        <div class="p-4 bg-surface border-t border-border w-full safe-area-bottom">
            <form onsubmit="handleAddLog(event)" class="relative flex gap-3">
                <input type="text" id="logInput" placeholder="What did you learn today?" 
                    class="flex-1 bg-surfaceHighlight border border-border text-white pl-4 pr-4 py-3.5 rounded-xl focus:outline-none focus:border-primary text-sm transition-colors">
                <button type="submit" id="logSubmitBtn" class="bg-primary text-white w-12 rounded-xl flex items-center justify-center shadow-glow active:scale-95 transition-transform">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </form>
        </div>
    </div>

    <script>
        // --- Identity & Auth Setup ---
        const activeUser = localStorage.getItem('skillmax_user');
        
        // Kick back to login if no session is found
        if (!activeUser) {
            window.location.href = '/index.html';
        }

        // Attach this custom header to every server request
        const getAuthHeaders = () => ({
            'Content-Type': 'application/json',
            'x-user-id': activeUser
        });

        function handleLogout() {
            localStorage.removeItem('skillmax_user');
            window.location.href = '/index.html';
        }

        // --- State ---
        let skills = [];
        let currentSkillId = null;
        let activeMobileTab = 'active'; 
        let currentFilter = 'All';

        let timerInterval = null;
        let timerSeconds = 0;
        let isTimerRunning = false;

        const categories = ['Code', 'Design', 'Music', 'Fitness', 'Life', 'Language'];

        // --- Init ---
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('activeUserDisplay').innerText = activeUser;
            loadSkills();
            renderCategoryChips();
            switchTab('active');
        });

        // --- Global Level Logic ---
        function updateGlobalLevel() {
            let totalLogs = 0;
            skills.forEach(s => totalLogs += (s.logs ? s.logs.length : 0));
            
            const totalXP = totalLogs * 10;
            const currentLevel = Math.floor(totalXP / 100) + 1;
            const xpTowardsNext = totalXP % 100;

            document.getElementById('global-level').innerText = `LVL ${currentLevel}`;
            document.getElementById('global-xp-bar').style.width = `${xpTowardsNext}%`;
        }

        // --- View Logic ---
        function switchTab(tabName) {
            activeMobileTab = tabName;
            
            ['backlog', 'active', 'mastered'].forEach(t => {
                const btn = document.getElementById(`tab-${t}`);
                if (t === tabName) {
                    btn.classList.add('tab-active');
                    btn.classList.remove('tab-inactive');
                } else {
                    btn.classList.add('tab-inactive');
                    btn.classList.remove('tab-active');
                }
            });

            const isMobile = window.innerWidth < 768;
            if (isMobile) {
                ['backlog', 'active', 'mastered'].forEach(t => {
                    const section = document.getElementById(`view-${t}`);
                    if (t === tabName) {
                        section.classList.remove('hidden');
                        section.classList.add('flex');
                    } else {
                        section.classList.add('hidden');
                        section.classList.remove('flex');
                    }
                });
            } else {
                ['backlog', 'active', 'mastered'].forEach(t => {
                    document.getElementById(`view-${t}`).classList.remove('hidden');
                });
            }
        }

        window.addEventListener('resize', () => switchTab(activeMobileTab));

        function setFilter(category) {
            currentFilter = category;
            renderDashboardFilters();
            renderBoard();
        }

        // --- API Data Logic (Using getAuthHeaders) ---
        async function loadSkills() {
            try {
                const response = await fetch('https://skillmax-api.onrender.com/api/skills', { headers: getAuthHeaders() });

                if (response.ok) {
                    skills = await response.json();
                } else {
                    console.error("Failed to fetch skills");
                }
            } catch (error) {
                console.error("API connection error:", error);
            }
            renderDashboardFilters();
            renderBoard();
            updateGlobalLevel();
        }

        async function handleCreateSkill(e) {
            e.preventDefault();
            const btn = document.getElementById('createSkillBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';

            const title = document.getElementById('skillInput').value;
            const category = document.getElementById('categoryInput').value;

            try {
                const response = await fetch('https://skillmax-api.onrender.com/api/skills', {
                    method: 'POST',
                    headers: getAuthHeaders(),
                    body: JSON.stringify({ title, category })
                });

                if (response.ok) {
                    const newSkill = await response.json();
                    skills.push(newSkill);
                    renderBoard();
                    renderDashboardFilters();
                    
                    document.getElementById('addSkillForm').reset();
                    selectCategoryChip(categories[0]);
                    closeModal('addSkillModal');
                    if(window.innerWidth < 768) switchTab('backlog');
                }
            } catch (error) {
                console.error("Error creating skill:", error);
            } finally {
                btn.innerHTML = originalText;
            }
        }

        async function handleAddLog(e, manualText = null) {
            if(e) e.preventDefault();
            
            const input = document.getElementById('logInput');
            const text = manualText || input.value.trim();
            const btn = document.getElementById('logSubmitBtn');
            
            if (!text || !currentSkillId) return;

            if(btn) btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';

            try {
                const response = await fetch(`https://skillmax-api.onrender.com/api/skills/${currentSkillId}/logs`, {
                    method: 'POST',
                    headers: getAuthHeaders(),
                    body: JSON.stringify({ text, isSystem: false })
                });

                if (response.ok) {
                    const newLog = await response.json();
                    const skill = skills.find(s => s.id === currentSkillId);
                    if (skill) {
                        if(!skill.logs) skill.logs = [];
                        skill.logs.unshift(newLog);
                        renderDetailContent(currentSkillId);
                        renderBoard();
                        updateGlobalLevel();
                    }
                    if(input) input.value = '';
                }
            } catch (error) {
                console.error("Error adding log:", error);
            } finally {
                if(btn) btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i>';
            }
        }

        async function updateStatus(newStatus) {
            if (!currentSkillId) return;
            const skill = skills.find(s => s.id === currentSkillId);
            
            if (skill && skill.status !== newStatus) {
                try {
                    const response = await fetch(`https://skillmax-api.onrender.com/api/skills/${currentSkillId}/status`, {
                        method: 'PUT',
                        headers: getAuthHeaders(),
                        body: JSON.stringify({ status: newStatus })
                    });

                    if (response.ok) {
                        const { updatedSkill, autoLog } = await response.json();
                        skill.status = newStatus;
                        
                        if (autoLog) {
                            if(!skill.logs) skill.logs = [];
                            skill.logs.unshift(autoLog);
                        }
                        
                        if(newStatus === 'mastered') {
                            fireConfetti();
                        }
                        renderDetailContent(currentSkillId);
                        renderBoard();
                    }
                } catch (error) {
                    console.error("Error updating status:", error);
                }
            }
        }

        async function deleteCurrentSkill() {
            if (!currentSkillId) return;
            if(confirm('Delete this skill?')) {
                try {
                    const response = await fetch(`https://skillmax-api.onrender.com/api/skills/${currentSkillId}`, {
                        method: 'DELETE',
                        headers: getAuthHeaders()
                    });

                    if (response.ok) {
                        skills = skills.filter(s => s.id !== currentSkillId);
                        currentSkillId = null;
                        renderBoard();
                        renderDashboardFilters();
                        updateGlobalLevel();
                        closeModal('detailModal');
                    }
                } catch (error) {
                    console.error("Error deleting skill:", error);
                }
            }
        }

        // --- Timer Logic ---
        function toggleTimer() {
            if (isTimerRunning) {
                clearInterval(timerInterval);
                isTimerRunning = false;
                
                const hours = Math.floor(timerSeconds / 3600);
                const mins = Math.floor((timerSeconds % 3600) / 60);
                const secs = timerSeconds % 60;
                
                let timeString = "";
                if(hours > 0) timeString += `${hours}h `;
                if(mins > 0) timeString += `${mins}m `;
                timeString += `${secs}s`;

                if(timerSeconds > 5) { 
                    handleAddLog(null, `🔥 Focus Session: ${timeString}`);
                }

                document.getElementById('timer-btn').innerHTML = '<i class="fa-solid fa-play ml-1"></i>';
                document.getElementById('timer-btn').classList.remove('bg-red-500', 'animate-pulse');
                document.getElementById('timer-btn').classList.add('bg-primary');
                timerSeconds = 0;
                document.getElementById('timer-display').innerText = "00:00:00";
                
            } else {
                isTimerRunning = true;
                
                document.getElementById('timer-btn').innerHTML = '<i class="fa-solid fa-stop"></i>';
                document.getElementById('timer-btn').classList.remove('bg-primary');
                document.getElementById('timer-btn').classList.add('bg-red-500', 'animate-pulse');

                timerInterval = setInterval(() => {
                    timerSeconds++;
                    const date = new Date(0);
                    date.setSeconds(timerSeconds);
                    const timeString = date.toISOString().substr(11, 8);
                    document.getElementById('timer-display').innerText = timeString;
                }, 1000);
            }
        }

        // --- Rendering ---
        function renderBoard() {
            const cols = {
                backlog: document.getElementById('col-backlog'),
                active: document.getElementById('col-active'),
                mastered: document.getElementById('col-mastered')
            };

            Object.values(cols).forEach(c => c.innerHTML = '');

            let counts = { backlog: 0, active: 0, mastered: 0 };

            const filteredSkills = currentFilter === 'All' 
                ? skills 
                : skills.filter(s => s.category === currentFilter);

            filteredSkills.forEach(skill => {
                counts[skill.status]++;
                cols[skill.status].appendChild(createCard(skill));
            });

            document.getElementById('count-backlog').innerText = counts.backlog;
            document.getElementById('count-active').innerText = counts.active;
            document.getElementById('count-mastered').innerText = counts.mastered;
        }

        function createCard(skill) {
            const div = document.createElement('div');
            
            const logCount = skill.logs ? skill.logs.length : 0;
            const progress = Math.min((logCount / 20) * 100, 100);
            
            let accentColor = 'border-border';
            if (skill.status === 'active') accentColor = 'border-primary/50';
            if (skill.status === 'mastered') accentColor = 'border-green-900';

            div.className = `card-gradient border ${accentColor} p-5 rounded-2xl cursor-pointer hover:border-primary transition-all active:scale-[0.98] group relative overflow-hidden`;
            div.onclick = () => openDetailModal(skill.id);

            const lastLog = (skill.logs && skill.logs.length > 0) ? skill.logs[0].text : 'No activity yet';
            
            div.innerHTML = `
                <div class="flex justify-between items-start mb-3 relative z-10">
                    <span class="text-[10px] font-bold text-textMuted bg-surfaceHighlight px-2 py-1 rounded-lg uppercase tracking-wider border border-border group-hover:bg-white group-hover:text-black transition-colors">${skill.category}</span>
                    <div class="flex items-center gap-2">
                        ${logCount > 5 ? '<i class="fa-solid fa-fire text-orange-500 text-xs animate-pulse"></i>' : ''}
                        ${skill.status === 'active' ? '<div class="w-2 h-2 rounded-full bg-primary shadow-[0_0_8px_rgba(255,42,66,0.8)]"></div>' : ''}
                    </div>
                </div>
                <h3 class="font-heading font-bold text-lg text-white mb-2 leading-tight relative z-10">${skill.title}</h3>
                <p class="text-xs text-textMuted line-clamp-2 font-medium relative z-10 mb-4 h-8">
                    ${lastLog}
                </p>
                
                <div class="relative z-10 mt-2">
                    <div class="flex justify-between text-[10px] text-textMuted font-bold mb-1">
                        <span>XP ${logCount * 10}</span>
                        <span>${Math.round(progress)}%</span>
                    </div>
                    <div class="h-1 w-full bg-surfaceHighlight rounded-full overflow-hidden">
                        <div class="h-full bg-gradient-to-r from-primaryDim to-primary" style="width: ${progress}%"></div>
                    </div>
                </div>
            `;
            return div;
        }

        function renderDashboardFilters() {
            const container = document.getElementById('dashboardFilters');
            const usedCats = [...new Set(skills.map(s => s.category))];
            const allCats = ['All', ...usedCats];
            
            container.innerHTML = allCats.map(cat => {
                const isActive = currentFilter === cat;
                return `
                    <button onclick="setFilter('${cat}')" 
                        class="whitespace-nowrap px-3 py-1.5 rounded-lg text-[10px] font-bold border transition-all 
                        ${isActive ? 'bg-primary text-white border-primary' : 'bg-surfaceHighlight text-textMuted border-border hover:border-textMuted'}">
                        ${cat}
                    </button>
                `
            }).join('');
        }

        // --- Detail Modal Render ---
        function openDetailModal(id) {
            currentSkillId = id;
            renderDetailContent(id);
            
            const modal = document.getElementById('detailModal');
            modal.classList.remove('hidden');
            timerSeconds = 0;
            isTimerRunning = false;
            document.getElementById('timer-display').innerText = "00:00:00";
            document.getElementById('timer-btn').innerHTML = '<i class="fa-solid fa-play ml-1"></i>';
            document.getElementById('timer-btn').className = "w-14 h-14 rounded-full bg-primary text-white shadow-glow flex items-center justify-center text-xl hover:scale-105 transition-all";
        }

        function renderDetailContent(id) {
            const skill = skills.find(s => s.id === id);
            if(!skill) return;

            document.getElementById('detailTitle').innerText = skill.title;
            document.getElementById('detailCategory').innerText = skill.category;
            
            const xp = (skill.logs ? skill.logs.length : 0) * 10;
            document.getElementById('skill-xp-display').innerText = xp;

            const dateStr = new Date(skill.createdAt).toLocaleDateString(undefined, { month:'short', day:'numeric', year:'numeric'});
            document.getElementById('detailDate').innerText = `Started ${dateStr}`;

            ['backlog', 'active', 'mastered'].forEach(s => {
                const btn = document.getElementById(`status-${s}`);
                btn.className = `flex-1 py-3 rounded-xl text-xs font-bold transition-all flex flex-col items-center gap-1`;
                
                if (s === skill.status) {
                    btn.classList.add('bg-white', 'text-black', 'shadow-lg', 'scale-105');
                } else {
                    btn.classList.add('bg-surfaceHighlight', 'text-textMuted', 'hover:bg-surface');
                }
            });

            const container = document.getElementById('logsContainer');
            container.innerHTML = '';

            if (!skill.logs || skill.logs.length === 0) {
                container.innerHTML = `<div class="text-textMuted text-sm italic py-4">Start your journey. Write your first log below.</div>`;
            } else {
                skill.logs.forEach((log, index) => {
                    const isSystem = log.isSystem;
                    const isTimer = log.text.includes("Focus Session");
                    const date = new Date(log.date);
                    const timeStr = date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    const dateStr = date.toLocaleDateString([], {month:'short', day:'numeric'});
                    
                    const item = document.createElement('div');
                    item.className = 'relative pl-6 pb-2 fade-enter';
                    setTimeout(() => item.classList.add('fade-enter-active'), index * 50);

                    let dotColor = 'bg-primary';
                    if(isSystem) dotColor = 'bg-border';
                    if(isTimer) dotColor = 'bg-orange-500';

                    item.innerHTML = `
                        <div class="absolute -left-[9px] top-1 w-4 h-4 rounded-full border-4 border-[#050505] ${dotColor}"></div>
                        <div class="flex flex-col">
                            <span class="text-[10px] font-bold text-textMuted mb-1">${dateStr} • ${timeStr}</span>
                            <div class="bg-surfaceHighlight p-3 rounded-xl rounded-tl-none text-sm ${isSystem ? 'text-textMuted italic' : 'text-gray-200'} border border-border/50">
                                ${log.text}
                            </div>
                        </div>
                    `;
                    container.appendChild(item);
                });
            }
        }

        // --- Helper: Category Chips ---
        function renderCategoryChips() {
            const container = document.getElementById('categoryChips');
            container.innerHTML = '';
            categories.forEach((cat, index) => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.innerText = cat;
                const isSelected = index === 0;
                btn.className = `whitespace-nowrap px-4 py-2 rounded-xl text-xs font-bold border transition-all ${isSelected ? 'bg-white text-black border-white' : 'bg-transparent border-border text-textMuted hover:border-textMuted'}`;
                
                btn.onclick = () => {
                    document.getElementById('categoryInput').value = cat;
                    selectCategoryChip(cat);
                };
                container.appendChild(btn);
            });
        }

        function selectCategoryChip(selectedCat) {
            const container = document.getElementById('categoryChips');
            Array.from(container.children).forEach(btn => {
                if (btn.innerText === selectedCat) {
                    btn.className = 'whitespace-nowrap px-4 py-2 rounded-xl text-xs font-bold border transition-all bg-white text-black border-white shadow-lg scale-105';
                } else {
                    btn.className = 'whitespace-nowrap px-4 py-2 rounded-xl text-xs font-bold border transition-all bg-transparent border-border text-textMuted hover:border-textMuted';
                }
            });
        }

        // --- Confetti ---
        function fireConfetti() {
            var count = 200;
            var defaults = { origin: { y: 0.7 } };

            function fire(particleRatio, opts) {
                confetti(Object.assign({}, defaults, opts, {
                    particleCount: Math.floor(count * particleRatio)
                }));
            }

            fire(0.25, { spread: 26, startVelocity: 55, colors: ['#FF2A42', '#ffffff'] });
            fire(0.2, { spread: 60 });
            fire(0.35, { spread: 100, decay: 0.91, scalar: 0.8 });
            fire(0.1, { spread: 120, startVelocity: 25, decay: 0.92, scalar: 1.2 });
            fire(0.1, { spread: 120, startVelocity: 45 });
        }

        // --- Modals ---
        function openModal(id) {
            const modal = document.getElementById(id);
            modal.classList.remove('hidden');
            if (id === 'addSkillModal') {
                setTimeout(() => {
                    document.getElementById('addModalContent').classList.remove('translate-y-full');
                }, 10);
                setTimeout(() => document.getElementById('skillInput').focus(), 100);
            }
        }

        function closeModal(id) {
            if(id === 'detailModal' && isTimerRunning) {
                if(!confirm("Timer is still running. Stop and close?")) return;
                toggleTimer();
            }

            const modal = document.getElementById(id);
            if (id === 'addSkillModal') {
                const content = document.getElementById('addModalContent');
                content.classList.add('translate-y-full');
                setTimeout(() => modal.classList.add('hidden'), 300);
            } else {
                modal.classList.add('hidden');
                if(id === 'detailModal') currentSkillId = null;
            }
        }

        window.onclick = function(event) {
            if (event.target.id === 'addSkillModal') closeModal('addSkillModal');
        }
    </script>
</body>
</html>
