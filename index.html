<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SkillMAX - Authentication</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Plus+Jakarta+Sans:wght@400;500;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        background: '#050505',
                        primary: '#FF2A42', 
                        primaryDim: '#CC152B',
                        textMain: '#EDEDED',
                        textMuted: '#888888',
                    },
                    fontFamily: {
                        heading: ['"Outfit"', 'sans-serif'],
                        body: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    boxShadow: {
                        'glow': '0 0 20px -5px rgba(255, 42, 66, 0.4)',
                        'glow-focus': '0 0 0 2px rgba(255, 42, 66, 0.3)',
                        'glass': '0 8px 32px 0 rgba(0, 0, 0, 0.5)',
                    },
                    animation: {
                        'pulse-slow': 'pulse 6s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'shake': 'shake 0.5s cubic-bezier(.36,.07,.19,.97) both',
                    },
                    keyframes: {
                        shake: {
                            '10%, 90%': { transform: 'translate3d(-1px, 0, 0)' },
                            '20%, 80%': { transform: 'translate3d(2px, 0, 0)' },
                            '30%, 50%, 70%': { transform: 'translate3d(-4px, 0, 0)' },
                            '40%, 60%': { transform: 'translate3d(4px, 0, 0)' }
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #050505;
            color: #EDEDED;
            -webkit-tap-highlight-color: transparent;
        }
        
        .bg-grid {
            background-image: linear-gradient(to right, #1a1a1a 1px, transparent 1px),
                            linear-gradient(to bottom, #1a1a1a 1px, transparent 1px);
            background-size: 30px 30px;
            mask-image: radial-gradient(circle at center, black 50%, transparent 100%);
            -webkit-mask-image: radial-gradient(circle at center, black 50%, transparent 100%);
        }

        /* Enhanced Glassmorphism Classes */
        .glass-card {
            background: rgba(20, 20, 20, 0.35);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }
        
        .glass-input {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }
        
        .glass-input:focus-within {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 42, 66, 0.5);
        }
    </style>
</head>
<body class="font-body min-h-screen flex items-center justify-center p-6 relative overflow-hidden">

    <div class="absolute inset-0 bg-grid opacity-30 pointer-events-none"></div>
    <div class="absolute top-1/4 left-1/4 w-[400px] h-[400px] bg-primary/20 rounded-full blur-[120px] pointer-events-none animate-pulse-slow"></div>
    <div class="absolute bottom-1/4 right-1/4 w-[300px] h-[300px] bg-purple-600/15 rounded-full blur-[100px] pointer-events-none"></div>

    <div class="w-full max-w-sm relative z-10" id="authContainer">
        
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl glass-card shadow-glow mb-5 text-primary text-3xl transition-transform hover:scale-105 duration-300">
                <i class="fa-solid fa-bolt"></i>
            </div>
            <h1 class="font-heading font-extrabold text-3xl tracking-tight" id="formTitle">
                Welcome <span class="text-primary">Back</span>
            </h1>
            <p class="text-textMuted text-sm font-medium mt-2" id="formSubtitle">Continue your journey.</p>
        </div>

        <div class="glass-card rounded-[2rem] p-6 md:p-8 relative overflow-hidden">
            
            <div class="absolute top-0 left-[-100%] w-[50%] h-full bg-gradient-to-r from-transparent via-white/5 to-transparent skew-x-[-20deg] pointer-events-none"></div>

            <div class="flex p-1 bg-black/40 backdrop-blur-md rounded-2xl border border-white/5 mb-8 relative">
                <div id="togglePill" class="absolute top-1 bottom-1 left-1 w-[calc(50%-4px)] bg-primary rounded-xl transition-all duration-300 shadow-glow pointer-events-none"></div>
                <button type="button" onclick="setMode('login')" id="btn-login" class="flex-1 py-3 text-xs font-bold font-heading text-white z-10 transition-colors">Log In</button>
                <button type="button" onclick="setMode('signup')" id="btn-signup" class="flex-1 py-3 text-xs font-bold font-heading text-textMuted hover:text-white z-10 transition-colors">Sign Up</button>
            </div>

            <form id="authForm" onsubmit="handleAuth(event)" class="space-y-5">
                
                <div class="space-y-2 group">
                    <label class="block text-textMuted text-[10px] font-bold uppercase tracking-wider ml-1 transition-colors group-focus-within:text-primary">User ID</label>
                    <div class="relative glass-input rounded-2xl">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fa-regular fa-user text-textMuted transition-colors group-focus-within:text-primary"></i>
                        </div>
                        <input type="text" id="userId" required placeholder="Choose an ID" 
                            class="w-full bg-transparent text-white pl-11 pr-4 py-4 rounded-2xl outline-none transition-all text-sm font-medium placeholder-white/20">
                    </div>
                </div>

                <div class="space-y-2 group">
                    <label class="block text-textMuted text-[10px] font-bold uppercase tracking-wider ml-1 transition-colors group-focus-within:text-primary">Password</label>
                    <div class="relative glass-input rounded-2xl">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fa-solid fa-lock text-textMuted transition-colors group-focus-within:text-primary"></i>
                        </div>
                        <input type="password" id="password" required placeholder="••••••••" 
                            class="w-full bg-transparent text-white pl-11 pr-12 py-4 rounded-2xl outline-none transition-all text-sm font-medium placeholder-white/20">
                        
                        <button type="button" onclick="togglePassword()" class="absolute inset-y-0 right-0 pr-4 flex items-center text-textMuted hover:text-white cursor-pointer transition-colors active:scale-90">
                            <i class="fa-regular fa-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>

                <div id="feedbackMsg" class="hidden text-xs font-bold text-center py-2 rounded-xl transition-all"></div>

                <div class="pt-4">
                    <button type="submit" id="submitBtn" class="w-full py-4 rounded-2xl bg-primary text-white font-heading font-bold text-sm shadow-glow hover:bg-primaryDim active:scale-[0.98] transition-all flex items-center justify-center gap-2 group relative overflow-hidden border border-white/10">
                        <span id="btnText" class="relative z-10">ENTER SYSTEM</span>
                        <i id="btnIcon" class="fa-solid fa-arrow-right relative z-10 group-hover:translate-x-1 transition-transform"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let isLoginMode = true;

        document.addEventListener('DOMContentLoaded', () => {
            if(localStorage.getItem('skillmax_user')) {
                window.location.href = './skillmax_mk2.html';
            }
            setMode('login');
        });

        function togglePassword() {
            const input = document.getElementById('password');
            const icon = document.getElementById('eyeIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        function setMode(mode) {
            isLoginMode = mode === 'login';
            
            const pill = document.getElementById('togglePill');
            const btnLogin = document.getElementById('btn-login');
            const btnSignup = document.getElementById('btn-signup');
            const title = document.getElementById('formTitle');
            const subtitle = document.getElementById('formSubtitle');
            const btnText = document.getElementById('btnText');
            const btnIcon = document.getElementById('btnIcon');
            const feedbackMsg = document.getElementById('feedbackMsg');

            feedbackMsg.classList.add('hidden');

            if (isLoginMode) {
                pill.style.transform = 'translateX(0)';
                btnLogin.classList.add('text-white');
                btnLogin.classList.remove('text-textMuted');
                btnSignup.classList.add('text-textMuted');
                btnSignup.classList.remove('text-white');
                
                title.innerHTML = 'Welcome <span class="text-primary">Back</span>';
                subtitle.innerText = 'Continue your journey.';
                btnText.innerText = 'LOG IN';
                btnIcon.className = 'fa-solid fa-arrow-right relative z-10 group-hover:translate-x-1 transition-transform';
            } else {
                pill.style.transform = 'translateX(calc(100% + 4px))';
                btnSignup.classList.add('text-white');
                btnSignup.classList.remove('text-textMuted');
                btnLogin.classList.add('text-textMuted');
                btnLogin.classList.remove('text-white');
                
                title.innerHTML = 'Join <span class="text-primary">SkillMAX</span>';
                subtitle.innerText = 'Start leveling up your life today.';
                btnText.innerText = 'CREATE ACCOUNT';
                btnIcon.className = 'fa-solid fa-user-plus relative z-10 group-hover:scale-110 transition-transform';
            }
        }

        async function handleAuth(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnIcon = document.getElementById('btnIcon');
            const container = document.getElementById('authContainer');
            const feedbackMsg = document.getElementById('feedbackMsg');
            
            const userId = document.getElementById('userId').value.trim();
            const password = document.getElementById('password').value;

            btnText.innerText = 'PROCESSING';
            btnIcon.className = 'fa-solid fa-circle-notch fa-spin relative z-10';
            btn.classList.add('opacity-80', 'cursor-not-allowed');
            feedbackMsg.classList.add('hidden');
            
const endpoint = isLoginMode ? 'https://skillmax-api.onrender.com/api/login' : 'https://skillmax-api.onrender.com/api/signup';


            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, password })
                });
                
                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('skillmax_user', data.userId);
                    
                    btn.classList.replace('bg-primary', 'bg-green-500');
                    btn.classList.remove('hover:bg-primaryDim');
                    btn.style.boxShadow = '0 0 20px -5px rgba(34, 197, 94, 0.4)';
                    btnText.innerText = isLoginMode ? 'ACCESS GRANTED' : 'ACCOUNT READY';
                    btnIcon.className = 'fa-solid fa-check relative z-10';
                    
                    setTimeout(() => { window.location.href = './skillmax_mk2.html'; }, 800);
                } else {
                    throw new Error(data.message || 'Authentication failed');
                }
            } catch (error) {
                container.classList.add('animate-shake');
                
                feedbackMsg.innerText = error.message;
                feedbackMsg.className = 'block text-xs font-bold text-center py-3 rounded-xl bg-red-500/10 text-red-500 border border-red-500/20 backdrop-blur-md';
                
                setTimeout(() => {
                    container.classList.remove('animate-shake');
                    btn.classList.remove('opacity-80', 'cursor-not-allowed');
                    setMode(isLoginMode ? 'login' : 'signup'); 
                }, 600);
            }
        }
    </script>
</body>
</html>
